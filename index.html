<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CertifyPro – Professional Certificate Generator" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>CertifyPro – Professional Certificate Generator</title>
    <style>
      html, body, #root { margin:0; padding:0; background:#060709; min-height:100vh; }
      #loader { position:fixed;inset:0;background:#060709;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s; }
      #loader.hide { opacity:0;pointer-events:none; }
      .ring { width:38px;height:38px;border:3px solid #1A1C26;border-top-color:#BFA46A;border-radius:50%;animation:sp .8s linear infinite; }
      @keyframes sp { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loader"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
